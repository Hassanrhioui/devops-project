name: CI/CD Pipeline

"on":
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'

env:
  IMAGE_NAME: hassan23rh/devops-project

permissions:
  contents: read
  packages: write

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            hassan23rh/devops-project
            ghcr.io/hassanrhioui/devops-project
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=hassan23rh/devops-project:buildcache
          cache-to: type=registry,ref=hassan23rh/devops-project:buildcache,mode=max

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Run deploy script
        run: /home/hassanrh/deploy.sh

      - name: Verify deployment health
        run: |
          echo "Waiting for app to start..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/status)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "DEPLOYMENT FAILED - App not responding"
            exit 1
          fi
          echo "DEPLOYMENT SUCCESS - App is healthy"